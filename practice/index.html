<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clawd-dj practice room</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0d10; color: #d7dde4; font: 14px/1.5 ui-monospace, Menlo, monospace;
         display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); grid-template-rows: auto auto 1fr; height: 100vh; }
  header { grid-column: 1 / -1; padding: 12px 16px; border-bottom: 1px solid #1d232b; display: flex; gap: 16px; align-items: center; }
  header h1 { font-size: 15px; margin: 0; color: #7ee0a3; }
  #join { background: #123822; border: 1px solid #2c6e45; color: #9ff0bd; border-radius: 8px; padding: 10px 22px; font: inherit; cursor: pointer; }
  #join.on { background: #161b22; color: #5b6675; border-color: #2a333e; cursor: default; }
  .pill { font-size: 12px; color: #5b6675; }
  .pill b { color: #7ee0a3; }
  #metrics { grid-column: 1 / -1; display: flex; gap: 22px; padding: 8px 16px; border-bottom: 1px solid #1d232b; flex-wrap: wrap; font-size: 12px; }
  #metrics span { color: #5b6675; } #metrics b { color: #d7dde4; font-variant-numeric: tabular-nums; }
  #metrics b.good { color: #7ee0a3; } #metrics b.bad { color: #f0b35e; }
  #code { margin: 0; padding: 14px 16px; overflow: auto; font-size: 12px; color: #a9c7e8; white-space: pre; border-right: 1px solid #1d232b; }
  #feed { overflow-y: auto; padding: 10px 16px; font-size: 12.5px; }
  #feed div { padding: 3px 0; color: #8b97a5; }
  #feed .adjust { color: #e8d28a; } #feed .best { color: #7ee0a3; font-weight: 600; }
  #feed .error { color: #ff7a7a; } #feed .session, #feed .done { color: #d7dde4; font-weight: 600; }
  #feed .t { color: #414b57; margin-right: 8px; }
</style>

<header>
  <h1>clawd-dj practice room</h1>
  <button id="join">▶ join the audio</button>
  <span class="pill">iteration <b id="p-iter">–</b></span>
  <span class="pill">score <b id="p-score">–</b> <span>(lower = closer to the record)</span></span>
  <span class="pill" id="p-status">connecting…</span>
</header>

<div id="metrics"></div>
<pre id="code">waiting for the session…</pre>
<div id="feed"></div>

<script src="https://unpkg.com/@strudel/web@1.3.0"></script>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  let audioOn = false, currentCode = null, evalPending = false;
  const replPromise = initStrudel({ prebake: () => samples('github:tidalcycles/dirt-samples') });

  async function playCurrent() {
    if (!audioOn || !currentCode || evalPending) return;
    evalPending = true;
    try { await replPromise; await evaluate(currentCode); } finally { evalPending = false; }
  }

  $('join').onclick = async () => {
    audioOn = true;
    $('join').textContent = '♪ live';
    $('join').classList.add('on');
    playCurrent();
  };

  function fmtMetrics(c) {
    const rows = [];
    rows.push(['bpm', `${c.a.bpm} / ${c.b.bpm}`, Math.abs(c.delta.bpm) < 1]);
    rows.push(['onsets/s', `${c.a.onsets_per_sec} / ${c.b.onsets_per_sec}`, Math.abs(c.delta.onsets_per_sec) < .5]);
    rows.push(['centroid', `${c.a.centroid_hz} / ${c.b.centroid_hz}Hz`, Math.abs(c.delta.centroid_hz) < 300]);
    for (const k of Object.keys(c.a.bands))
      rows.push([k, `${c.a.bands[k].toFixed(2)} / ${c.b.bands[k].toFixed(2)}`, Math.abs(c.delta.bands[k]) < .05]);
    $('metrics').innerHTML = rows.map(([k, v, ok]) =>
      `<span>${k} <b class="${ok ? 'good' : 'bad'}">${v}</b></span>`).join('') +
      '<span style="margin-left:auto">mine / record</span>';
  }

  const es = new EventSource('/events');
  es.onopen = () => { $('p-status').textContent = 'live'; };
  es.onerror = () => { $('p-status').textContent = 'reconnecting…'; };
  es.onmessage = (m) => {
    const e = JSON.parse(m.data);
    if (e.iteration != null) $('p-iter').textContent = e.iteration;
    if (e.score != null) $('p-score').textContent = e.score;
    if (e.comparison) fmtMetrics(e.comparison);
    if (e.code && e.code !== currentCode) {
      currentCode = e.code;
      $('code').textContent = e.code;
      playCurrent(); // hear each new candidate as the AI tries it
    }
    const div = document.createElement('div');
    div.className = e.kind;
    div.innerHTML = `<span class="t">${e.t}</span>` + (e.msg || e.kind)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;');
    $('feed').appendChild(div);
    $('feed').scrollTop = $('feed').scrollHeight;
  };
})();
</script>
