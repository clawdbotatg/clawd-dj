<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clawd-dj practice room</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; background: #0b0d10; color: #d7dde4; font: 14px/1.5 ui-monospace, Menlo, monospace;
         display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); grid-template-rows: auto auto auto 1fr; height: 100vh; }
  header { grid-column: 1 / -1; padding: 12px 16px; border-bottom: 1px solid #1d232b; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 15px; margin: 0; color: #7ee0a3; }
  button { background: #161b22; color: #d7dde4; border: 1px solid #2a333e; border-radius: 8px; padding: 8px 16px; font: inherit; cursor: pointer; }
  button:hover { border-color: #7ee0a3; }
  #join { background: #123822; border-color: #2c6e45; color: #9ff0bd; }
  #join.on { background: #161b22; color: #5b6675; border-color: #2a333e; cursor: default; }
  .pill { font-size: 12px; color: #5b6675; } .pill b { color: #7ee0a3; }
  #controls { grid-column: 1 / -1; padding: 8px 16px; border-bottom: 1px solid #1d232b; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 12px; }
  select, input[type=number] { background: #161b22; color: #d7dde4; border: 1px solid #2a333e; border-radius: 6px; padding: 6px 8px; font: inherit; font-size: 12px; }
  input[type=number] { width: 64px; }
  #xfade { accent-color: #7ee0a3; }
  #metrics { grid-column: 1 / -1; display: flex; gap: 22px; padding: 8px 16px; border-bottom: 1px solid #1d232b; flex-wrap: wrap; font-size: 12px; }
  #metrics span { color: #5b6675; } #metrics b { color: #d7dde4; font-variant-numeric: tabular-nums; }
  #metrics b.good { color: #7ee0a3; } #metrics b.bad { color: #f0b35e; }
  #code { margin: 0; padding: 14px 16px; overflow: auto; font-size: 12px; color: #a9c7e8; white-space: pre; border-right: 1px solid #1d232b; }
  #feed { overflow-y: auto; padding: 10px 16px; font-size: 12.5px; }
  #feed div { padding: 3px 0; color: #8b97a5; }
  #feed .adjust { color: #e8d28a; } #feed .best { color: #7ee0a3; font-weight: 600; }
  #feed .error { color: #ff7a7a; } #feed .session, #feed .done { color: #d7dde4; font-weight: 600; }
  #feed .t { color: #414b57; margin-right: 8px; }
  iframe { display: none; }
</style>

<header>
  <h1>clawd-dj practice room</h1>
  <button id="join">▶ join the audio</button>
  <span class="pill">deck <b id="p-deck">–</b></span>
  <span class="pill">iteration <b id="p-iter">–</b></span>
  <span class="pill">score <b id="p-score">–</b> (lower = closer)</span>
  <span class="pill" id="p-status">connecting…</span>
</header>

<div id="controls">
  <span>rehearse</span>
  <select id="c-code"></select>
  <span>against</span>
  <select id="c-ref"></select>
  <span>@</span><input type="number" id="c-start" value="555">s
  <span>for</span><input type="number" id="c-dur" value="30">s
  <span>×</span><input type="number" id="c-iters" value="6">
  <button id="c-go">start session</button>
  <span style="border-left:1px solid #2a333e;height:22px"></span>
  <span>🎧 set</span>
  <input type="text" id="s-genre" value="techno" style="width:110px;background:#161b22;color:#d7dde4;border:1px solid #2a333e;border-radius:6px;padding:6px 8px;font:inherit;font-size:12px">
  <input type="number" id="s-mins" value="15">min
  <button id="s-go">play a set</button>
  <span style="margin-left:auto">crossfade <input type="range" id="xfade" min="0" max="12" step="1" value="4"> <b id="xfade-v">4</b>s</span>
</div>

<div id="metrics"></div>
<pre id="code">waiting for a session — pick a track above and hit start.</pre>
<div id="feed"></div>

<iframe id="deckA" src="/player.html"></iframe>
<iframe id="deckB" src="/player.html"></iframe>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  let audioOn = false, currentCode = null, live = 'A', swapping = false;
  const deck = (n) => $('deck' + n).contentWindow.deck;
  const other = () => (live === 'A' ? 'B' : 'A');

  // DJ crossfade: cue the new code on the idle deck at gain 0, let it start
  // playing, then ride both master gains (equal-power) and stop the old deck.
  async function crossfadeTo(code) {
    if (!audioOn || swapping) { currentCode = code; return; }
    swapping = true;
    try {
      const secs = +$('xfade').value;
      const idle = other();
      const res = await deck(idle).play(code);
      if (!res.ok) { $('p-status').textContent = 'deck eval error'; return; }
      await new Promise((r) => setTimeout(r, 400)); // let the first haps land
      deck(idle).fadeTo(1, secs * 1000);
      deck(live).fadeTo(0, secs * 1000);
      await new Promise((r) => setTimeout(r, secs * 1000 + 100));
      deck(live).stop();
      live = idle;
      $('p-deck').textContent = live;
    } finally { swapping = false; }
  }

  $('join').onclick = async () => {
    audioOn = true;
    $('join').textContent = '♪ live';
    $('join').classList.add('on');
    await Promise.all([deck('A').ready(), deck('B').ready()]);
    if (currentCode) {
      await deck(live).play(currentCode);
      deck(live).fadeTo(1, 1500);
      $('p-deck').textContent = live;
    }
  };
  $('xfade').oninput = () => { $('xfade-v').textContent = $('xfade').value; };

  // ---- session controls ----
  async function loadCatalog() {
    const c = await (await fetch('/catalog')).json();
    $('c-code').innerHTML = c.repros.map((r) => `<option value="${r}">${r.split('/').pop()}</option>`).join('');
    $('c-ref').innerHTML = c.refs.map((r) =>
      `<option value="${r.path}" data-dur="${r.duration}">${r.title.slice(0, 48)}</option>`).join('');
  }
  loadCatalog();
  $('c-go').onclick = async () => {
    const body = {
      code: $('c-code').value, ref: $('c-ref').value,
      start: +$('c-start').value, dur: +$('c-dur').value, iters: +$('c-iters').value,
    };
    const r = await fetch('/session', { method: 'POST', body: JSON.stringify(body) });
    $('p-status').textContent = r.ok ? 'session starting…' : `busy (${r.status})`;
  };
  $('s-go').onclick = async () => {
    const body = { genre: $('s-genre').value, minutes: +$('s-mins').value };
    const r = await fetch('/set', { method: 'POST', body: JSON.stringify(body) });
    $('p-status').textContent = r.ok ? 'set starting…' : `busy (${r.status})`;
  };

  // ---- metrics + feed ----
  function fmtMetrics(c) {
    const rows = [];
    rows.push(['bpm', `${c.a.bpm} / ${c.b.bpm}`, Math.abs(c.delta.bpm) < 1]);
    rows.push(['onsets/s', `${c.a.onsets_per_sec} / ${c.b.onsets_per_sec}`, Math.abs(c.delta.onsets_per_sec) < .5]);
    rows.push(['centroid', `${c.a.centroid_hz} / ${c.b.centroid_hz}Hz`, Math.abs(c.delta.centroid_hz) < 300]);
    for (const k of Object.keys(c.a.bands))
      rows.push([k, `${c.a.bands[k].toFixed(2)} / ${c.b.bands[k].toFixed(2)}`, Math.abs(c.delta.bands[k]) < .05]);
    $('metrics').innerHTML = rows.map(([k, v, ok]) =>
      `<span>${k} <b class="${ok ? 'good' : 'bad'}">${v}</b></span>`).join('') +
      '<span style="margin-left:auto">mine / record</span>';
  }

  const es = new EventSource('/events');
  es.onopen = () => { $('p-status').textContent = 'live'; };
  es.onerror = () => { $('p-status').textContent = 'reconnecting…'; };
  es.onmessage = (m) => {
    const e = JSON.parse(m.data);
    if (e.iteration != null) $('p-iter').textContent = e.iteration;
    if (e.score != null) $('p-score').textContent = e.score;
    if (e.comparison) fmtMetrics(e.comparison);
    if (e.code && e.code !== currentCode) {
      const first = currentCode == null;
      currentCode = e.code;
      $('code').textContent = e.code;
      if (audioOn) {
        if (first) { deck(live).play(e.code).then(() => deck(live).fadeTo(1, 1500)); $('p-deck').textContent = live; }
        else if (e.mode === 'inplace') deck(live).play(e.code); // beat-aligned in-language swap (set mode)
        else crossfadeTo(e.code);
      }
    }
    const div = document.createElement('div');
    div.className = e.kind;
    div.innerHTML = `<span class="t">${e.t}</span>` + (e.msg || e.kind)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;');
    $('feed').appendChild(div);
    $('feed').scrollTop = $('feed').scrollHeight;
  };
})();
</script>
